<!DOCTYPE html>
<html>
<head>
  <title>RULZ4YOU STORE</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      color: white;
      text-align: center;
    }

    .container {
      max-width: 400px;
      margin: auto;
      padding: 30px 20px;
      animation: fadeIn 0.8s ease-in-out;
    }

    h1 {
      margin-bottom: 5px;
      font-size: 28px;
      letter-spacing: 1px;
    }

    p {
      margin-top: 0;
      opacity: 0.8;
      font-size: 14px;
    }

    .box {
      background: white;
      color: black;
      padding: 25px;
      border-radius: 18px;
      margin-top: 25px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.4);
      transition: 0.3s;
    }

    .box:hover {
      transform: translateY(-5px);
    }

    input, select {
      width: 100%;
      padding: 12px;
      margin: 12px 0;
      border-radius: 12px;
      border: 1px solid #ddd;
      font-size: 14px;
      transition: 0.2s;
    }

    input:focus, select:focus {
      border-color: #6a5acd;
      outline: none;
      box-shadow: 0 0 5px rgba(106,90,205,0.4);
    }

    button {
      background: linear-gradient(45deg, #00c9ff, #92fe9d);
      color: black;
      padding: 12px;
      border: none;
      width: 100%;
      border-radius: 12px;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.05);
      box-shadow: 0 5px 15px rgba(0,0,0,0.3);
    }

    @keyframes fadeIn {
      from {opacity: 0; transform: translateY(20px);}
      to {opacity: 1; transform: translateY(0);}
    }

    @media (max-width: 480px) {
      .container {
        padding: 20px 15px;
      }
    }

  </style>
</head>
<body>

<div class="container">
  <h1>RULZ4YOU STORE</h1>
  <p>Top Up Game Murah, Cepat & Aman</p>

  <div class="box">
    <select id="game" onchange="updateNominal()">
      <option value="">Pilih Game</option>
      <option value="ml">Mobile Legends</option>
      <option value="ff">Free Fire</option>
      <option value="pubg">PUBG Mobile</option>
    </select>

    <input type="text" id="userid" placeholder="Masukkan User ID">

    <select id="nominal">
      <option value="">Pilih Nominal</option>
    </select>

    <button onclick="kirimWA()">Pesan Sekarang</button>
  </div>
</div>

<script>
function updateNominal() {
  var game = document.getElementById("game").value;
  var nominal = document.getElementById("nominal");

  nominal.innerHTML = '<option value="">Pilih Nominal</option>';

  if (game == "ml") {
    nominal.innerHTML += '<option>170 Diamond - Rp 66.000</option>';
    nominal.innerHTML += '<option>169 Diamond - Rp 38.000</option>';
    nominal.innerHTML += '<option>240 Diamond - Rp 69.000</option>';
    nominal.innerHTML += '<option>229 Diamond - Rp 81.000</option>';
    nominal.innerHTML += '<option>408 Diamond - Rp 116.000</option>';
    nominal.innerHTML += '<option>568 Diamond - Rp 159.000</option>';
    nominal.innerHTML += '<option>466 Diamond - Rp 162.000</option>';
    nominal.innerHTML += '<option>592 Diamond - Rp 202.000</option>';
    nominal.innerHTML += '<option>875 Diamond - Rp 243.000</option>';
  }

  if (game == "ff") {
    nominal.innerHTML += '<option>12 Diamond - Rp 2.000</option>';
    nominal.innerHTML += '<option>50 Diamond - Rp 8.000</option>';
    nominal.innerHTML += '<option>70 Diamond - Rp 10.000</option>';
    nominal.innerHTML += '<option>140 Diamond - Rp 20.000</option>';
    nominal.innerHTML += '<option>355 Diamond - Rp 50.000</option>';
  }

  if (game == "pubg") {
    nominal.innerHTML += '<option>60 UC - Rp 16.000</option>';
    nominal.innerHTML += '<option>325 UC - Rp 75.000</option>';
    nominal.innerHTML += '<option>660 UC - Rp 150.000</option>';
  }
}

function kirimWA() {
  var game = document.getElementById("game").value;
  var userid = document.getElementById("userid").value;
  var nominal = document.getElementById("nominal").value;

  if(game == "" || userid == "" || nominal == "") {
    alert("Harap isi semua data!");
    return;
  }

  var nomor = "6285960446999"; // GANTI NOMOR KAMU
  var pesan = "Halo, saya ingin top up.%0A" +
              "Game: " + game + "%0A" +
              "User ID: " + userid + "%0A" +
              "Nominal: " + nominal;

  window.open("https://wa.me/" + nomor + "?text=" + pesan);
}
</script>

</body>
</html>
